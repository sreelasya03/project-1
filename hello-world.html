<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8f4ea;
      --muted: #c9c0ad;
      --line: rgba(248, 244, 234, 0.18);
      --ember: #ff6b35;
      --mint: #66e2b3;
      --sky: #7bb7ff;
      --plum: #a17cff;
      --bg: #111316;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 22%, rgba(255, 107, 53, 0.24), transparent 26vw),
        radial-gradient(circle at 86% 18%, rgba(102, 226, 179, 0.20), transparent 24vw),
        radial-gradient(circle at 54% 92%, rgba(123, 183, 255, 0.22), transparent 30vw),
        linear-gradient(145deg, #111316 0%, #1a1d22 45%, #0c0e10 100%);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: radial-gradient(circle at center, black 0%, transparent 72%);
      opacity: 0.35;
    }

    main {
      position: relative;
      width: min(880px, calc(100vw - 32px));
      padding: clamp(32px, 7vw, 76px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(17, 19, 22, 0.72);
      box-shadow: 0 32px 90px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(22px);
    }

    .kicker {
      margin: 0 0 24px;
      color: var(--mint);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 8ch;
      margin: 0;
      font-size: clamp(4rem, 14vw, 9.75rem);
      line-height: 0.82;
      letter-spacing: 0;
    }

    h1 span {
      display: block;
      color: transparent;
      background: linear-gradient(90deg, var(--ember), #ffd166 35%, var(--mint) 68%, var(--sky));
      background-clip: text;
      -webkit-background-clip: text;
    }

    p {
      max-width: 560px;
      margin: 28px 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.2rem);
      line-height: 1.7;
    }

    .spark {
      position: absolute;
      width: 12px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--mint);
      box-shadow: 0 0 36px var(--mint);
      animation: drift 7s ease-in-out infinite;
    }

    .spark.one {
      top: 22%;
      right: 12%;
    }

    .spark.two {
      right: 24%;
      bottom: 18%;
      width: 8px;
      background: var(--plum);
      box-shadow: 0 0 32px var(--plum);
      animation-delay: -2.5s;
    }

    .spark.three {
      left: 10%;
      bottom: 24%;
      width: 10px;
      background: var(--ember);
      box-shadow: 0 0 34px var(--ember);
      animation-delay: -4s;
    }

    @keyframes drift {
      50% {
        transform: translate3d(0, -22px, 0) scale(1.35);
      }
    }

    @media (max-width: 560px) {
      main {
        padding: 32px 24px;
      }

      .spark {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="spark one"></div>
    <div class="spark two"></div>
    <div class="spark three"></div>
    <p class="kicker">Tiny page, big entrance</p>
    <h1>Hello <span>World</span></h1>
    <p>A fancy little welcome screen with luminous color, glassy depth, and just enough motion to make the classic greeting feel alive.</p>
  </main>
</body>
</html>
