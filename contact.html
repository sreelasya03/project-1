<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Hello World</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8f4ea;
      --muted: #c9c0ad;
      --line: rgba(248, 244, 234, 0.18);
      --ember: #ff6b35;
      --mint: #66e2b3;
      --sky: #7bb7ff;
      --plum: #a17cff;
      --bg: #111316;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 96px 16px 32px;
      background:
        radial-gradient(circle at 16% 20%, rgba(123, 183, 255, 0.22), transparent 26vw),
        radial-gradient(circle at 84% 24%, rgba(255, 107, 53, 0.22), transparent 24vw),
        radial-gradient(circle at 52% 92%, rgba(102, 226, 179, 0.18), transparent 30vw),
        linear-gradient(145deg, #111316 0%, #1a1d22 45%, #0c0e10 100%);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: radial-gradient(circle at center, black 0%, transparent 72%);
      opacity: 0.35;
    }

    nav {
      position: fixed;
      z-index: 2;
      top: 20px;
      left: 50%;
      display: flex;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(17, 19, 22, 0.70);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(18px);
      transform: translateX(-50%);
    }

    nav a {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 0 18px;
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 750;
      text-decoration: none;
      white-space: nowrap;
      transition: 180ms ease;
    }

    nav a:hover,
    nav a[aria-current="page"] {
      background: rgba(248, 244, 234, 0.12);
      color: var(--ink);
    }

    main {
      position: relative;
      width: min(880px, calc(100vw - 32px));
      padding: clamp(32px, 7vw, 76px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(17, 19, 22, 0.72);
      box-shadow: 0 32px 90px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(22px);
    }

    .kicker {
      margin: 0 0 24px;
      color: var(--mint);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 9ch;
      margin: 0;
      font-size: clamp(3.7rem, 12vw, 8.2rem);
      line-height: 0.86;
      letter-spacing: 0;
    }

    h1 span {
      display: block;
      color: transparent;
      background: linear-gradient(90deg, var(--sky), var(--mint) 46%, #ffd166 82%);
      background-clip: text;
      -webkit-background-clip: text;
    }

    p {
      max-width: 620px;
      margin: 28px 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.2rem);
      line-height: 1.7;
    }

    form {
      display: grid;
      gap: 16px;
      max-width: 640px;
      margin-top: 34px;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--ink);
      font-weight: 750;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 15px 16px;
      background: rgba(248, 244, 234, 0.08);
      color: var(--ink);
      font: inherit;
      outline: none;
    }

    textarea {
      min-height: 132px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: var(--mint);
      box-shadow: 0 0 0 4px rgba(102, 226, 179, 0.12);
    }

    button {
      justify-self: start;
      min-height: 48px;
      border: 0;
      border-radius: 999px;
      padding: 0 24px;
      background: linear-gradient(90deg, var(--ember), #ffd166 45%, var(--mint));
      color: #111316;
      font: inherit;
      font-weight: 850;
      cursor: pointer;
      box-shadow: 0 18px 44px rgba(255, 107, 53, 0.20);
    }

    @media (max-width: 560px) {
      body {
        padding-top: 88px;
      }

      nav {
        width: calc(100vw - 32px);
        justify-content: center;
      }

      nav a {
        flex: 1;
        justify-content: center;
        min-width: 0;
        padding: 0 10px;
      }

      main {
        padding: 32px 24px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <nav aria-label="Main navigation">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html" aria-current="page">Contact</a>
  </nav>

  <main>
    <p class="kicker">Say hello back</p>
    <h1>Contact <span>Us</span></h1>
    <p>Drop a note, send a thought, or simply keep the greeting going. This form is styled and ready for a future backend when you want one.</p>
    <form>
      <label>
        Name
        <input type="text" name="name" placeholder="Ada Lovelace">
      </label>
      <label>
        Email
        <input type="email" name="email" placeholder="ada@example.com">
      </label>
      <label>
        Message
        <textarea name="message" placeholder="Hello from the other page..."></textarea>
      </label>
      <button type="button">Send Message</button>
    </form>
  </main>
</body>
</html>
